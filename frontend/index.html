<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevOps Practice</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        button:hover { background: #0056b3; }
        #response { margin-top: 20px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <h1>Мой первый DevSecOps проект</h1>
    <button onclick="checkBackend()">Проверить связь с Бэкендом</button>
    <p id="response"></p>

    <script>
        async function checkBackend() {
            try {
                const res = await fetch('/api/hello', { method: 'POST' });
                const data = await res.json();
                document.getElementById('response').innerText = data.message;
            } catch (e) {
                document.getElementById('response').innerText = "Ошибка: Бэкенд не ответил";
            }
        }
    </script>
</body>
</html>
